name: alldebrid_app
description: "A professional AllDebrid client for Android with video player and download manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  dio: ^5.7.0
  
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5
  
  file_picker: ^10.3.10

  permission_handler: ^12.0.1
  
  flutter_local_notifications: ^20.1.0
  
  flutter_slidable: ^4.0.3
  
  screen_brightness: ^2.1.7
  
  flutter_vector_icons: ^2.0.0

  url_launcher: ^6.3.1
  share_plus: 12.0.1
  
  fluttertoast: ^9.0.0
  
  pull_to_refresh_flutter3: ^2.0.2

  glass: ^2.0.0+2
  blur: ^4.0.0
  
  uuid: ^4.5.1

  intl: ^0.20.2
  html: ^0.15.5
  
  google_fonts: ^8.0.2
  
  open_filex: ^4.7.0
  http: ^1.6.0
  carousel_slider: ^5.1.1
  
  animated_custom_dropdown: ^3.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon_black.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon_black.png"
