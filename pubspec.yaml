name: alldebrid_app
description: "A professional AllDebrid client for Android with video player and download manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  
  # Networking
  dio: ^5.7.0
  
  # UI Components
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  like_button: ^2.0.5
  lottie: ^3.1.3
  flutter_svg: ^2.0.10
  
  # Video Player
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  
  # File Management
  file_picker: ^8.1.7

  permission_handler: ^11.3.1
  
  # Icons
  flutter_vector_icons: ^2.0.0
  
  # JSON Annotations
  json_annotation: ^4.9.0
  
  # Clipboard
  clipboard: ^0.1.3
  
  # URL Launcher
  url_launcher: ^6.3.1
  
  # Toast/Snackbar
  fluttertoast: ^8.2.10
  
  # Refresh indicator
  pull_to_refresh_flutter3: ^2.0.2
  
  # Glassmorphism
  glass: ^2.0.0+2
  blur: ^4.0.0
  
  # UUID generation
  uuid: ^4.5.1
  
  # Intl for formatting
  intl: ^0.20.2
  
  # Archive
  archive: ^4.0.3
  
  # HTML Parsing (for some host links)
  html: ^0.15.5
  
  # Google fonts
  google_fonts: ^6.2.1
  
  # Advanced search bar
  search_page: ^2.3.0
  open_filex: ^4.7.0
  http: ^1.6.0
  simple_pip_mode: ^1.1.0
  carousel_slider: ^5.1.1
  ffi: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
